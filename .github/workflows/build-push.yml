name: Build and Push Minecraft Image to ECR

on:
  push:
    tags:
      - "v*"

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: ops4-ecr-nechypak
  UPSTREAM_IMAGE: itzg/minecraft-server:2026.3.2-java21
  MINECRAFT_VERSION: "1.21.1"

jobs:
  build-test-push:
    name: Build, test, and push Minecraft image
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository files
        uses: actions/checkout@v4

      - name: Configure AWS Academy credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Pull pinned upstream Minecraft server image
        run: |
          docker pull ${{ env.UPSTREAM_IMAGE }}

      - name: Retag upstream image for local test
        run: |
          docker tag ${{ env.UPSTREAM_IMAGE }} \
            ${{ env.ECR_REPOSITORY }}:${{ github.ref_name }}

      - name: Run Minecraft smoke test
        run: |
          echo "Starting Minecraft smoke test..."

          docker run -d \
            --name minecraft-smoke-test \
            -e EULA=TRUE \
            -e VERSION=${{ env.MINECRAFT_VERSION }} \
            -e MEMORY=1G \
            ${{ env.ECR_REPOSITORY }}:${{ github.ref_name }}

          echo "Waiting for Minecraft server initialization..."

          for i in $(seq 1 12); do
            echo "Smoke test attempt $i of 12"

            if docker logs minecraft-smoke-test 2>&1 | grep -q "Done"; then
              echo "Minecraft server started successfully."
              docker stop minecraft-smoke-test
              docker rm minecraft-smoke-test
              exit 0
            fi

            sleep 10
          done

          echo "Minecraft server failed to start during smoke test."
          docker logs minecraft-smoke-test || true
          docker stop minecraft-smoke-test || true
          docker rm minecraft-smoke-test || true
          exit 1

      - name: Tag image with ECR registry path
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          docker tag ${{ env.ECR_REPOSITORY }}:${{ github.ref_name }} \
            $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:${{ github.ref_name }}

      - name: Push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:${{ github.ref_name }}