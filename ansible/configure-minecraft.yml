---
- name: Configure Minecraft server on EC2 with k3s
  hosts: minecraft
  become: true

  vars:
    ecr_repo_url: "339712937184.dkr.ecr.us-east-1.amazonaws.com/ops4-ecr-nechypak"
    minecraft_image: "v1.0.0"
    bucket_name: "ops4-s3-nechypak"
    world_backup_key: "backup.tar.gz"
    data_dir: "/opt/minecraft-kubernetes"
    minecraft_version: "1.21.1"
    motd: "Kanstantsin Nechyparenka nechypak 934561768"

  tasks:
    - name: Install packages needed for k3s, AWS, and downloads
      apt:
        name:
          - curl
          - ca-certificates
          - gnupg
          - awscli
        state: present
        update_cache: true

    - name: Install k3s lightweight Kubernetes
      shell: |
        curl -sfL https://get.k3s.io | sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Prepare kubeconfig for root user
      shell: |
        mkdir -p /root/.kube
        cp /etc/rancher/k3s/k3s.yaml /root/.kube/config
        chown root:root /root/.kube/config
        chmod 600 /root/.kube/config

    - name: Create or update image pull secret for private ECR image
      shell: |
        kubectl create secret docker-registry ecr-secret \
          --docker-server=339712937184.dkr.ecr.us-east-1.amazonaws.com \
          --docker-username=AWS \
          --docker-password=$(aws ecr get-login-password --region us-east-1) \
          --dry-run=client -o yaml | kubectl apply -f -
      environment:
        KUBECONFIG: /root/.kube/config

    - name: Create directory for Kubernetes YAML files
      file:
        path: "{{ data_dir }}"
        state: directory
        mode: "0755"

    - name: Create persistent storage manifest
      copy:
        dest: "{{ data_dir }}/01-minecraft-pvc.yaml"
        content: |
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: minecraft-pvc
            labels:
              app: minecraft
          spec:
            accessModes:
              - ReadWriteOnce
            storageClassName: local-path
            resources:
              requests:
                storage: 10Gi

    - name: Apply persistent storage manifest
      shell: |
        kubectl apply -f {{ data_dir }}/01-minecraft-pvc.yaml
      environment:
        KUBECONFIG: /root/.kube/config

    - name: Create Minecraft configuration manifest
      copy:
        dest: "{{ data_dir }}/02-minecraft-configmap.yaml"
        content: |
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: minecraft-config
            labels:
              app: minecraft
          data:
            EULA: "TRUE"
            VERSION: "{{ minecraft_version }}"
            MOTD: "{{ motd }}"

    - name: Apply Minecraft configuration manifest
      shell: |
        kubectl apply -f {{ data_dir }}/02-minecraft-configmap.yaml
      environment:
        KUBECONFIG: /root/.kube/config

    - name: Create Minecraft network service manifest
      copy:
        dest: "{{ data_dir }}/03-minecraft-service.yaml"
        content: |
          apiVersion: v1
          kind: Service
          metadata:
            name: minecraft-service
            labels:
              app: minecraft
          spec:
            type: LoadBalancer
            selector:
              app: minecraft
            ports:
              - name: minecraft
                port: 25565
                targetPort: 25565
                protocol: TCP

    - name: Apply Minecraft network service manifest
      shell: |
        kubectl apply -f {{ data_dir }}/03-minecraft-service.yaml
      environment:
        KUBECONFIG: /root/.kube/config

    - name: Create Minecraft deployment manifest
      copy:
        dest: "{{ data_dir }}/04-minecraft-deployment.yaml"
        content: |
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: minecraft
            labels:
              app: minecraft
          spec:
            replicas: 1
            strategy:
              type: Recreate
            selector:
              matchLabels:
                app: minecraft
            template:
              metadata:
                labels:
                  app: minecraft
              spec:
                imagePullSecrets:
                  - name: ecr-secret
                containers:
                  - name: minecraft
                    image: {{ ecr_repo_url }}:{{ minecraft_image }}
                    imagePullPolicy: Always
                    ports:
                      - containerPort: 25565
                    envFrom:
                      - configMapRef:
                          name: minecraft-config
                    volumeMounts:
                      - name: minecraft-storage
                        mountPath: /data
                    resources:
                      requests:
                        cpu: "250m"
                        memory: "1Gi"
                      limits:
                        cpu: "1000m"
                        memory: "1Gi"
                    startupProbe:
                      tcpSocket:
                        port: 25565
                      failureThreshold: 60
                      periodSeconds: 10
                    readinessProbe:
                      tcpSocket:
                        port: 25565
                      initialDelaySeconds: 60
                      periodSeconds: 10
                    livenessProbe:
                      tcpSocket:
                        port: 25565
                      initialDelaySeconds: 90
                      periodSeconds: 10
                volumes:
                  - name: minecraft-storage
                    persistentVolumeClaim:
                      claimName: minecraft-pvc

    - name: Apply Minecraft deployment manifest
      shell: |
        kubectl apply -f {{ data_dir }}/04-minecraft-deployment.yaml
      environment:
        KUBECONFIG: /root/.kube/config

    - name: Create S3 backup job manifest
      copy:
        dest: "{{ data_dir }}/05-minecraft-backup.yaml"
        content: |
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: minecraft-backup
            labels:
              app: minecraft
              purpose: backup
          spec:
            template:
              spec:
                restartPolicy: Never
                containers:
                  - name: minecraft-backup
                    image: alpine:3.19
                    command:
                      - /bin/sh
                      - -c
                    args:
                      - |
                        set -e
                        echo "Installing tools for backup"
                        apk add --no-cache aws-cli tar gzip
                        echo "Creating compressed world archive"
                        tar -czf /tmp/{{ world_backup_key }} -C /data .
                        echo "Uploading backup archive to S3"
                        aws s3 cp /tmp/{{ world_backup_key }} s3://{{ bucket_name }}/{{ world_backup_key }}
                        echo "Backup completed"
                    volumeMounts:
                      - name: minecraft-storage
                        mountPath: /data
                volumes:
                  - name: minecraft-storage
                    persistentVolumeClaim:
                      claimName: minecraft-pvc

    - name: Create S3 restore job manifest
      copy:
        dest: "{{ data_dir }}/06-minecraft-restore.yaml"
        content: |
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: minecraft-restore
            labels:
              app: minecraft
              purpose: restore
          spec:
            template:
              spec:
                restartPolicy: Never
                containers:
                  - name: minecraft-restore
                    image: alpine:3.19
                    command:
                      - /bin/sh
                      - -c
                    args:
                      - |
                        set -e
                        echo "Installing tools for restore"
                        apk add --no-cache aws-cli tar gzip
                        echo "Downloading backup archive from S3"
                        aws s3 cp s3://{{ bucket_name }}/{{ world_backup_key }} /tmp/{{ world_backup_key }}
                        echo "Restoring archive into Minecraft data directory"
                        tar -xzf /tmp/{{ world_backup_key }} -C /data
                        echo "Restore completed"
                    volumeMounts:
                      - name: minecraft-storage
                        mountPath: /data
                volumes:
                  - name: minecraft-storage
                    persistentVolumeClaim:
                      claimName: minecraft-pvc