---
- name: Configure Minecraft k3s server on EC2
  hosts: minecraft
  become: true

  vars:
    aws_region: "us-east-1"

    ecr_repository_name: "ops3-minecraft-lab"
    ecr_image_tag: "mc-java21-v1"

    backup_bucket_name: "ops3-nechypak-minecraft-backups"
    minecraft_backup_prefix: "world-backups"

    minecraft_namespace: "minecraft"
    minecraft_deployment: "minecraft"

    minecraft_version: "1.21.1"
    minecraft_memory: "1G"
    minecraft_motd: "Kanstantsin Nechyparenka nechypak - Ops4"

    kubeconfig_path: "/etc/rancher/k3s/k3s.yaml"
    rendered_manifest_path: "/opt/minecraft/minecraft.yml"

  tasks:
    - name: Install base packages required for k3s, AWS CLI, and backups
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - unzip
          - tar
        state: present
        update_cache: true
        cache_valid_time: 3600
        lock_timeout: 300

    - name: Install AWS CLI v2 when missing
      ansible.builtin.shell: |
        set -e
        cd /tmp
        curl -s "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o awscliv2.zip
        rm -rf /tmp/aws
        unzip -q -o awscliv2.zip
        /tmp/aws/install
      args:
        creates: /usr/local/bin/aws
        executable: /bin/bash

    - name: Verify AWS identity from EC2 instance profile
      ansible.builtin.command: /usr/local/bin/aws sts get-caller-identity
      register: aws_identity
      changed_when: false

    - name: Show AWS identity used by LabInstanceProfile
      ansible.builtin.debug:
        var: aws_identity.stdout

    - name: Get AWS account ID
      ansible.builtin.command: /usr/local/bin/aws sts get-caller-identity --query Account --output text
      register: aws_account_id
      changed_when: false

    - name: Set ECR registry and image URI facts
      ansible.builtin.set_fact:
        ecr_registry: "{{ aws_account_id.stdout }}.dkr.ecr.{{ aws_region }}.amazonaws.com"
        minecraft_image_uri: "{{ aws_account_id.stdout }}.dkr.ecr.{{ aws_region }}.amazonaws.com/{{ ecr_repository_name }}:{{ ecr_image_tag }}"

    - name: Stop old Docker Compose Minecraft container if it exists
      ansible.builtin.shell: |
        docker ps -aq --filter name=minecraft | xargs -r docker rm -f
      args:
        executable: /bin/bash
      failed_when: false
      changed_when: false

    - name: Install k3s if missing
      ansible.builtin.shell: |
        curl -sfL https://get.k3s.io | sh -
      args:
        creates: /usr/local/bin/k3s
        executable: /bin/bash

    - name: Ensure k3s service is running and enabled
      ansible.builtin.service:
        name: k3s
        state: started
        enabled: true

    - name: Wait for Kubernetes node to become Ready
      ansible.builtin.shell: |
        for i in $(seq 1 30); do
          if KUBECONFIG={{ kubeconfig_path }} kubectl get nodes | grep -q " Ready "; then
            exit 0
          fi
          sleep 5
        done
        KUBECONFIG={{ kubeconfig_path }} kubectl get nodes
        exit 1
      args:
        executable: /bin/bash
      changed_when: false

    - name: Create Minecraft working directory
      ansible.builtin.file:
        path: /opt/minecraft
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Create Minecraft namespace first
      ansible.builtin.shell: |
        KUBECONFIG={{ kubeconfig_path }} kubectl create namespace {{ minecraft_namespace }} --dry-run=client -o yaml | \
        KUBECONFIG={{ kubeconfig_path }} kubectl apply -f -
      args:
        executable: /bin/bash
      changed_when: false

    - name: Create or refresh ECR imagePullSecret from instance profile credentials
      ansible.builtin.shell: |
        set -euo pipefail

        ECR_PASSWORD="$(/usr/local/bin/aws ecr get-login-password --region {{ aws_region }})"

        KUBECONFIG={{ kubeconfig_path }} kubectl -n {{ minecraft_namespace }} create secret docker-registry ecr-creds \
          --docker-server={{ ecr_registry }} \
          --docker-username=AWS \
          --docker-password="$ECR_PASSWORD" \
          --dry-run=client -o yaml | \
        KUBECONFIG={{ kubeconfig_path }} kubectl apply -f -
      args:
        executable: /bin/bash
      changed_when: false

    - name: Install ECR secret refresh script
      ansible.builtin.copy:
        dest: /usr/local/bin/refresh-ecr-secret.sh
        owner: root
        group: root
        mode: "0755"
        content: |
          #!/usr/bin/env bash
          set -euo pipefail

          AWS_REGION="{{ aws_region }}"
          ECR_REGISTRY="{{ ecr_registry }}"
          KUBECONFIG="{{ kubeconfig_path }}"
          NAMESPACE="{{ minecraft_namespace }}"

          ECR_PASSWORD="$(/usr/local/bin/aws ecr get-login-password --region "$AWS_REGION")"

          kubectl -n "$NAMESPACE" create secret docker-registry ecr-creds \
            --docker-server="$ECR_REGISTRY" \
            --docker-username=AWS \
            --docker-password="$ECR_PASSWORD" \
            --dry-run=client -o yaml | \
          kubectl apply -f -

    - name: Install systemd service for refreshing ECR pull secret
      ansible.builtin.copy:
        dest: /etc/systemd/system/refresh-ecr-secret.service
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=Refresh Kubernetes ECR imagePullSecret for Minecraft

          [Service]
          Type=oneshot
          Environment=KUBECONFIG={{ kubeconfig_path }}
          ExecStart=/usr/local/bin/refresh-ecr-secret.sh

    - name: Install systemd timer for refreshing ECR pull secret
      ansible.builtin.copy:
        dest: /etc/systemd/system/refresh-ecr-secret.timer
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=Refresh Kubernetes ECR imagePullSecret every 6 hours

          [Timer]
          OnBootSec=2min
          OnUnitActiveSec=6h
          Persistent=true

          [Install]
          WantedBy=timers.target

    - name: Enable ECR secret refresh timer
      ansible.builtin.systemd:
        name: refresh-ecr-secret.timer
        enabled: true
        state: started
        daemon_reload: true

    - name: Copy Kubernetes Minecraft manifest
      ansible.builtin.copy:
        src: ../kubernetes/minecraft.yml
        dest: "{{ rendered_manifest_path }}"
        owner: root
        group: root
        mode: "0644"

    - name: Apply Kubernetes Minecraft manifest
      ansible.builtin.command: kubectl apply -f {{ rendered_manifest_path }}
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      register: kubectl_apply
      changed_when: "'configured' in kubectl_apply.stdout or 'created' in kubectl_apply.stdout"

    - name: Wait for Minecraft deployment rollout
      ansible.builtin.command: >
        kubectl -n {{ minecraft_namespace }} rollout status deployment/{{ minecraft_deployment }} --timeout=10m
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      changed_when: false

    - name: Show Kubernetes nodes
      ansible.builtin.command: kubectl get nodes -o wide
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      register: kubectl_nodes
      changed_when: false

    - name: Print Kubernetes nodes
      ansible.builtin.debug:
        var: kubectl_nodes.stdout_lines

    - name: Show Minecraft pods
      ansible.builtin.command: kubectl -n {{ minecraft_namespace }} get pods -o wide
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      register: kubectl_pods
      changed_when: false

    - name: Print Minecraft pods
      ansible.builtin.debug:
        var: kubectl_pods.stdout_lines

    - name: Install Minecraft Kubernetes backup script
      ansible.builtin.copy:
        dest: /usr/local/bin/minecraft-backup.sh
        owner: root
        group: root
        mode: "0755"
        content: |
          #!/usr/bin/env bash
          set -euo pipefail

          AWS_REGION="{{ aws_region }}"
          BUCKET="{{ backup_bucket_name }}"
          PREFIX="{{ minecraft_backup_prefix }}"
          NAMESPACE="{{ minecraft_namespace }}"
          KUBECONFIG="{{ kubeconfig_path }}"
          BACKUP_FILE="/tmp/minecraft-backup-$(date +%Y%m%d-%H%M%S).tar.gz"

          POD="$(kubectl -n "$NAMESPACE" get pod -l app=minecraft -o jsonpath='{.items[0].metadata.name}')"

          kubectl -n "$NAMESPACE" exec "$POD" -- tar -czf - -C /data . > "$BACKUP_FILE"

          /usr/local/bin/aws s3 cp "$BACKUP_FILE" "s3://$BUCKET/$PREFIX/$(basename "$BACKUP_FILE")" --region "$AWS_REGION"
          /usr/local/bin/aws s3 cp "$BACKUP_FILE" "s3://$BUCKET/$PREFIX/latest.tar.gz" --region "$AWS_REGION"

          rm -f "$BACKUP_FILE"

    - name: Install Minecraft backup systemd service
      ansible.builtin.copy:
        dest: /etc/systemd/system/minecraft-backup.service
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=Back up Minecraft Kubernetes world data to S3
          After=k3s.service

          [Service]
          Type=oneshot
          Environment=KUBECONFIG={{ kubeconfig_path }}
          ExecStart=/usr/local/bin/minecraft-backup.sh

    - name: Install Minecraft backup systemd timer
      ansible.builtin.copy:
        dest: /etc/systemd/system/minecraft-backup.timer
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=Run Minecraft world backup every 15 minutes

          [Timer]
          OnBootSec=5min
          OnUnitActiveSec=15min
          Persistent=true

          [Install]
          WantedBy=timers.target

    - name: Enable Minecraft backup timer
      ansible.builtin.systemd:
        name: minecraft-backup.timer
        enabled: true
        state: started
        daemon_reload: true